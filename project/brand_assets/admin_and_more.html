  <script>
  // ═══════════════════════════════════════════════
  //  ROSEBELLA ADMIN SYSTEM
  // ═══════════════════════════════════════════════
  const ADMIN_EMAIL = 'yousefaljailey@gmail.com';
  const ADMIN_PASS  = 'Yy12345678!';
  let isAdmin = false;
  let curSlug = null;
  let pendingImgUid = null;

  // ── Auth ──────────────────────────────────────
  function showLogin() {
    document.getElementById('loginModalBg').classList.add('show');
    setTimeout(() => document.getElementById('lmEmail').focus(), 100);
  }
  function hideLogin() {
    document.getElementById('loginModalBg').classList.remove('show');
    document.getElementById('lmError').textContent = '';
    document.getElementById('lmEmail').value = '';
    document.getElementById('lmPass').value = '';
  }
  function doLogin() {
    const email = document.getElementById('lmEmail').value.trim();
    const pass  = document.getElementById('lmPass').value;
    const err   = document.getElementById('lmError');
    if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
      isAdmin = true;
      hideLogin();
      document.getElementById('adminBar').classList.add('show');
      document.getElementById('adminTrigger').style.display = 'none';
      document.body.classList.add('admin-active');
      apToast('Welcome back, Yousef! 👋');
    } else {
      err.textContent = 'Incorrect email or password. Please try again.';
      document.getElementById('lmPass').value = '';
    }
  }
  function doLogout() {
    isAdmin = false;
    document.getElementById('adminBar').classList.remove('show');
    document.getElementById('adminTrigger').style.display = 'flex';
    document.body.classList.remove('admin-active');
    closePanel();
    apToast('Signed out successfully.');
  }

  // ── Panel ─────────────────────────────────────
  function openPanel() {
    closeCart();
    buildSidebar();
    document.getElementById('apPanel').classList.add('show');
    document.getElementById('apOverlay').classList.add('show');
  }
  function closePanel() {
    document.getElementById('apPanel').classList.remove('show');
    document.getElementById('apOverlay').classList.remove('show');
  }

  // ── Build sidebar ─────────────────────────────
  function buildSidebar() {
    const sb = document.getElementById('apSb');
    const tabs = document.querySelectorAll('.cat-tab:not([data-cat="all"])');
    let h = '<div class="ap-sb-title">Collections</div>';
    tabs.forEach(t => {
      const slug  = t.dataset.cat;
      const name  = t.textContent.trim();
      const count = document.querySelectorAll(`.prod-card[data-cat="${slug}"]`).length;
      const act   = slug === curSlug ? 'active' : '';
      h += `<div class="ap-ci ${act}" onclick="selectCol('${slug}','${name.replace(/'/g,"\'")}')">
        <span>${name}</span><span class="ap-ci-count">${count}</span></div>`;
    });
    sb.innerHTML = h;
  }

  // ── Select collection ─────────────────────────
  function selectCol(slug, name) {
    curSlug = slug;
    document.querySelectorAll('.ap-ci').forEach(i => i.classList.remove('active'));
    const item = document.querySelector(`.ap-ci[onclick*="${slug}"]`);
    if (item) item.classList.add('active');

    const tabEl = document.querySelector(`.cat-tab[data-cat="${slug}"]`);
    const curName = tabEl ? tabEl.textContent.trim() : name;
    const cards   = document.querySelectorAll(`.prod-card[data-cat="${slug}"]`);

    let h = `
      <div class="ap-rename-bar">
        <label>Collection Name</label>
        <input class="ap-rename-inp" id="renInp" value="${curName}" />
        <button class="ap-rename-btn" onclick="renameCol('${slug}')">Rename</button>
      </div>
      <div class="ap-pg" id="apPg">`;

    cards.forEach((card, i) => {
      const imgEl   = card.querySelector('img');
      const bgEl    = card.querySelector('.prod-img-bg');
      const nameEl  = card.querySelector('.prod-body h3');
      const descEl  = card.querySelector('.prod-desc');
      const priceEl = card.querySelector('.prod-price');
      const badgeEl = card.querySelector('.prod-badge');

      const imgSrc    = imgEl ? imgEl.src : '';
      const imgPos    = imgEl ? (imgEl.style.objectPosition || 'center top') : 'center top';
      const cardName  = nameEl  ? nameEl.textContent.trim() : '';
      const cardDesc  = descEl  ? descEl.textContent.trim() : '';
      let   cardPrice = '';
      if (priceEl) {
        const cl = priceEl.cloneNode(true);
        const cu = cl.querySelector('.currency'); if (cu) cu.remove();
        cardPrice = cl.textContent.trim();
      }
      const cardBadge = badgeEl ? badgeEl.className.replace('prod-badge','').trim() : '';
      const uid = `u-${slug}-${i}`;
      card.dataset.apid = uid;

      const bOpts = ['','badge-popular','badge-new','badge-sale'].map(b => {
        const lbl = {'':'None','badge-popular':'Bestseller','badge-new':'New','badge-sale':'Sale'}[b];
        const sel = b === cardBadge ? 'sel' : '';
        return `<span class="ap-bo ${sel}" data-b="${b}" onclick="selBadge(this,'${uid}')">${lbl}</span>`;
      }).join('');

      // Image position selector
      // Parse stored transform (scale + translate)
      const imgData = (card && card.dataset.imgTransform) ? JSON.parse(card.dataset.imgTransform) : {scale:1,x:0,y:0};
      const posHtml = ''; // replaced by zoom toolbar below

      h += `
        <div class="ap-pc" id="apc-${uid}">
          <div class="ap-pi" onclick="trigImg('${uid}')">
            ${imgSrc
              ? `<div id="apim-${uid}" class="ap-editor-wrap"
                   style="background-image:url(${imgSrc});background-size:100% auto;background-position:50% 0%;background-repeat:no-repeat;"></div>`
              : `<div class="ap-pi-placeholder"><span>🌸</span><span>No photo yet</span></div>`}
            <div class="ap-pi-overlay" onclick="event.stopPropagation();trigImg('${uid}')"><span>📷 Change Photo</span></div>
            <div class="ap-img-bar" id="apbar-${uid}">
              <button class="ap-ib" onclick="event.stopPropagation();edZoom('${uid}',-0.15)">−</button>
              <span class="ap-ipct" id="appct-${uid}">100%</span>
              <button class="ap-ib" onclick="event.stopPropagation();edZoom('${uid}',0.15)">+</button>
              <button class="ap-ireset" onclick="event.stopPropagation();edReset('${uid}')">↺ Fit</button>
            </div>
            <div class="ap-img-bar" id="apbar-${uid}">
              <button class="ap-ib" onclick="event.stopPropagation();edZoom('${uid}',-0.15)">−</button>
              <span class="ap-ipct" id="appct-${uid}">Fit</span>
              <button class="ap-ib" onclick="event.stopPropagation();edZoom('${uid}',0.15)">+</button>
              <button class="ap-ireset" onclick="event.stopPropagation();edReset('${uid}')">↺ Fit</button>
            </div>
          </div>
          <div class="ap-pb">
            <div><span class="ap-fl">Name</span>
              <input class="ap-fi" id="apn-${uid}" value="${cardName.replace(/"/g,'&quot;')}" /></div>
            <div><span class="ap-fl">Description</span>
              <textarea class="ap-fi ap-fi-desc" id="apd-${uid}">${cardDesc}</textarea></div>
            <div><span class="ap-fl">Price (QAR)</span>
              <input class="ap-fi ap-fi-price" id="app-${uid}" value="${cardPrice}" /></div>
            <div><span class="ap-fl">Badge</span>
              <div class="ap-badge-row">${bOpts}</div></div>
          </div>
          <div class="ap-ca">
            <button class="ap-save-btn" id="apsb-${uid}" onclick="saveCard('${uid}')">Save</button>
            <button class="ap-del-btn" onclick="delCard('${uid}','${slug}')">🗑</button>
          </div>
        </div>`;
    });

    h += `
        <div class="ap-add-tile" onclick="addProduct('${slug}','${curName.replace(/'/g,"\'")}')">
          <span class="ap-plus">＋</span><span>Add New Product</span>
        </div>
      </div>`;

    document.getElementById('apMc').innerHTML = h;
  }

  // ── Rename collection ─────────────────────────
  function renameCol(slug) {
    const v = document.getElementById('renInp').value.trim();
    if (!v) return;
    const tab = document.querySelector(`.cat-tab[data-cat="${slug}"]`);
    if (tab) tab.textContent = v;
    document.querySelectorAll(`.prod-card[data-cat="${slug}"] .prod-cat`).forEach(e => e.textContent = v);
    buildSidebar();
    selectCol(slug, v);
    apToast('Collection renamed!');
  }

  // ── Badge selector ────────────────────────────
  function selBadge(el, uid) {
    el.closest('.ap-badge-row').querySelectorAll('.ap-bo').forEach(o => o.classList.remove('sel'));
    el.classList.add('sel');
  }

  // ── Image position ────────────────────────────
  function setImgPos(btn, uid) {
    const pos = btn.dataset.pos;
    btn.closest('.ap-pi-pos').querySelectorAll('.ap-pos-btn').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    // Update admin preview
    const apImg = document.getElementById(`apim-${uid}`);
    if (apImg) apImg.style.objectPosition = pos;
    // Update main card image
    const card = document.querySelector(`.prod-card[data-apid="${uid}"]`);
    if (card) {
      const mainImg = card.querySelector('.prod-img img');
      if (mainImg) mainImg.style.objectPosition = pos;
    }
    apToast('Image position updated!');
  }

  // ── Save card ─────────────────────────────────
  function saveCard(uid) {
    const card = document.querySelector(`.prod-card[data-apid="${uid}"]`);
    if (!card) return;
    const nm  = document.getElementById(`apn-${uid}`).value.trim();
    const dc  = document.getElementById(`apd-${uid}`).value.trim();
    const pr  = document.getElementById(`app-${uid}`).value.trim();
    const bEl = document.querySelector(`#apc-${uid} .ap-bo.sel`);
    const bv  = bEl ? bEl.dataset.b : '';
    const bt  = bEl ? bEl.textContent.trim() : '';

    const nEl = card.querySelector('.prod-body h3');
    const dEl = card.querySelector('.prod-desc');
    const pEl = card.querySelector('.prod-price');
    let   bdEl= card.querySelector('.prod-badge');

    if (nEl) nEl.textContent = nm;
    if (dEl) dEl.textContent = dc;
    if (pEl) { const cu = pEl.querySelector('.currency'); pEl.innerHTML = (cu ? cu.outerHTML : '') + pr; }

    if (bv && bt !== 'None') {
      if (!bdEl) { bdEl = document.createElement('span'); const pi = card.querySelector('.prod-img'); if (pi) pi.insertBefore(bdEl, pi.firstChild); }
      bdEl.className = `prod-badge ${bv}`; bdEl.textContent = bt;
    } else if (bdEl && bt === 'None') { bdEl.remove(); }

    const addB = card.querySelector('.prod-add');
    if (addB) addB.setAttribute('onclick', `openVariantModal(this,'${nm.replace(/'/g,"\'")}')`);

    const sb = document.getElementById(`apsb-${uid}`);
    if (sb) { sb.textContent='✓ Saved!'; sb.classList.add('saved'); setTimeout(()=>{ sb.textContent='Save'; sb.classList.remove('saved'); },2000); }
    buildSidebar();
    apToast(`"${nm}" saved!`);
  }

  // ── Delete card ───────────────────────────────
  function delCard(uid, slug) {
    if (!confirm('Delete this product from the website?')) return;
    const c = document.querySelector(`.prod-card[data-apid="${uid}"]`);
    if (c) c.remove();
    const ap = document.getElementById(`apc-${uid}`);
    if (ap) ap.remove();
    buildSidebar();
    apToast('Product deleted.');
  }

  // ── Image upload ──────────────────────────────
  function trigImg(uid) { pendingImgUid = uid; document.getElementById('apFileIn').click(); }

  document.getElementById('apFileIn').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file || !pendingImgUid) return;
    const uid = pendingImgUid;
    const reader = new FileReader();
    reader.onload = ev => {
      const src = ev.target.result;
      // Update main page card
      const card = document.querySelector(`.prod-card[data-apid="${uid}"]`);
      if (card) {
        const mImg = card.querySelector('.prod-img img');
        const mBg  = card.querySelector('.prod-img-bg');
        if (mImg) { mImg.src = src; }
        else if (mBg) { mBg.style.cssText=`background-image:url(${src});background-size:cover;background-position:center;`; mBg.className='prod-img-bg'; }
        else { const pi=card.querySelector('.prod-img'); if(pi){ const img=document.createElement('img'); img.src=src; img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;'; pi.insertBefore(img,pi.firstChild); } }
      }
      // Update admin preview - re-render the whole card
      selectCol(curSlug, document.querySelector(`.cat-tab[data-cat="${curSlug}"]`)?.textContent.trim() || curSlug);
      apToast('Photo uploaded!');
    };
    reader.readAsDataURL(file);
    this.value = '';
  });

    const b = new Blob([h],{type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b); a.download='rosebella-website.html'; a.click();

    apToast('Downloading updated website!');

  // ── Toast ─────────────────────────────────────
  function apToast(msg) {
    const t = document.getElementById('apToast');
    t.textContent = '✓ ' + msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2400);
  }

  // ══════════════════════════════════════════════
  //  POS SYSTEM
  // ══════════════════════════════════════════════
  const POS_ORDERS_KEY = 'rosebella_pos_orders';

  let posOrder = { items:[], discountType:'none', discountValue:0, paymentMethod:'cash', status:'paid' };
  let posOrders = (function(){ try{ return JSON.parse(localStorage.getItem(POS_ORDERS_KEY))||[]; }catch(e){ return []; } })();

  function savePosOrders() { localStorage.setItem(POS_ORDERS_KEY, JSON.stringify(posOrders)); }

  // ── Open / Close ──────────────────────────────
  function openPOS() {
    closeCart(); closePanel();
    document.getElementById('posOverlay').classList.add('show');
    renderPosProducts('');
    updatePosUI();
  }
  function closePOS() { document.getElementById('posOverlay').classList.remove('show'); }

  // ── Product browser ───────────────────────────
  function posFilterProducts(q) { renderPosProducts(q.trim().toLowerCase()); }

  function renderPosProducts(query) {
    const grid = document.getElementById('posProductGrid');
    let html = '', count = 0;
    document.querySelectorAll('.prod-card').forEach(card => {
      const nameEl  = card.querySelector('.prod-body h3');
      const catEl   = card.querySelector('.prod-cat');
      const priceEl = card.querySelector('.prod-price');
      const imgEl   = card.querySelector('.prod-img img');
      const bgEl    = card.querySelector('.prod-img-bg');
      const name    = nameEl  ? nameEl.textContent.trim()  : '';
      const cat     = catEl   ? catEl.textContent.trim()   : '';
      if (query && !name.toLowerCase().includes(query) && !cat.toLowerCase().includes(query)) return;
      let price = 0;
      if (priceEl) { const cl=priceEl.cloneNode(true); const cu=cl.querySelector('.currency'); if(cu) cu.remove(); price=parseFloat(cl.textContent.trim())||0; }
      const imgSrc   = imgEl ? imgEl.src : '';
      const bgMatch  = bgEl  ? (bgEl.className.match(/pi-\d+/)||[''])[0] : '';
      const safeN = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const safeC = cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      count++;
      html += `
        <div class="pos-tile" onclick="posAddItem('${safeN}','${safeC}',${price})">
          <div class="pos-tile-img ${bgMatch}" style="${imgSrc?`background-image:url(${imgSrc});background-size:cover;background-position:center`:''}">
            ${!imgSrc ? '<span class="pos-tile-img-icon">🌸</span>' : ''}
          </div>
          <div class="pos-tile-body">
            <span class="pos-tile-cat">${cat}</span>
            <div class="pos-tile-name">${name}</div>
            <div class="pos-tile-footer">
              <span class="pos-tile-price">QR ${price}</span>
              <button class="pos-tile-add" onclick="event.stopPropagation();posAddItem('${safeN}','${safeC}',${price})">+</button>
            </div>
          </div>
        </div>`;
    });
    if (!count) html = '<div class="pos-no-results">No products match your search</div>';
    grid.innerHTML = html;
  }

  // ── Order mutations ───────────────────────────
  function posAddItem(name, cat, price) {
    const ex = posOrder.items.find(i => i.name === name);
    if (ex) { ex.qty++; } else { posOrder.items.push({ id: Date.now(), name, cat, price, qty:1 }); }
    updatePosUI();
  }
  function posChangeQty(id, delta) {
    const item = posOrder.items.find(i => i.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) posOrder.items = posOrder.items.filter(i => i.id !== id);
    updatePosUI();
  }
  function posRemoveItem(id) { posOrder.items = posOrder.items.filter(i => i.id !== id); updatePosUI(); }

  // ── Discount ──────────────────────────────────
  function posDiscTypeChange(type) {
    posOrder.discountType = type;
    const inp = document.getElementById('posDiscVal');
    inp.disabled = (type === 'none');
    if (type === 'none') { inp.value = '0'; posOrder.discountValue = 0; }
    updatePosUI();
  }
  function posUpdateDiscount() {
    posOrder.discountValue = parseFloat(document.getElementById('posDiscVal').value) || 0;
    updatePosUI();
  }

  // ── Payment / Status ──────────────────────────
  function posSetPayment(method) {
    posOrder.paymentMethod = method;
    document.querySelectorAll('[data-method]').forEach(b => b.classList.toggle('pay-active', b.dataset.method === method));
  }
  function posSetStatus(status) {
    posOrder.status = status;
    document.querySelectorAll('[data-status]').forEach(b => {
      b.classList.remove('paid-active','unpaid-active');
      if (b.dataset.status === status) b.classList.add(status === 'paid' ? 'paid-active' : 'unpaid-active');
    });
  }

  // ── Totals ────────────────────────────────────
  function posCalcTotals() {
    const subtotal = posOrder.items.reduce((s,i) => s + i.price * i.qty, 0);
    let discount = 0;
    if (posOrder.discountType === 'percent') discount = subtotal * posOrder.discountValue / 100;
    else if (posOrder.discountType === 'fixed') discount = Math.min(posOrder.discountValue, subtotal);
    return { subtotal, discount, total: Math.max(0, subtotal - discount) };
  }

  // ── Render UI ─────────────────────────────────
  function updatePosUI() {
    const { subtotal, discount, total } = posCalcTotals();
    const count = posOrder.items.reduce((s,i) => s + i.qty, 0);

    const badge = document.getElementById('posItemBadge');
    if (badge) badge.textContent = count > 0 ? `${count} item${count!==1?'s':''}` : '0 items';

    document.getElementById('posSubVal').textContent   = `QR ${subtotal.toFixed(0)}`;
    document.getElementById('posDiscAmt').textContent  = `−QR ${discount.toFixed(0)}`;
    document.getElementById('posTotalVal').textContent = total.toFixed(0);
    document.getElementById('posDiscRow').style.display = discount > 0 ? 'flex' : 'none';

    const container = document.getElementById('posOrderItems');
    if (posOrder.items.length === 0) {
      container.innerHTML = '<div class="pos-order-empty"><span>🛒</span><p>Tap a product to add it</p></div>';
      return;
    }
    container.innerHTML = posOrder.items.map(item => `
      <div class="pos-order-item">
        <div class="pos-oi-info">
          <span class="pos-oi-cat">${item.cat}</span>
          <span class="pos-oi-name">${item.name}</span>
        </div>
        <div class="pos-qty-grp">
          <button class="pos-qb" onclick="posChangeQty(${item.id},-1)">−</button>
          <span class="pos-qn">${item.qty}</span>
          <button class="pos-qb" onclick="posChangeQty(${item.id},1)">+</button>
        </div>
        <span class="pos-oi-price">QR ${(item.price*item.qty).toFixed(0)}</span>
        <button class="pos-oi-del" onclick="posRemoveItem(${item.id})">🗑</button>
      </div>`).join('');
  }

  // ── Complete order ────────────────────────────
  function posCompleteOrder() {
    if (posOrder.items.length === 0) { apToast('Add items before completing.'); return; }
    const { subtotal, discount, total } = posCalcTotals();
    const order = {
      id: `ORD-${Date.now().toString().slice(-6)}`,
      timestamp: new Date().toISOString(),
      items: posOrder.items.map(i => ({...i})),
      subtotal, discount, discountType: posOrder.discountType,
      discountValue: posOrder.discountValue, total,
      paymentMethod: posOrder.paymentMethod, status: posOrder.status
    };
    posOrders.unshift(order);
    savePosOrders();
    apToast(`✓ Order ${order.id} — QR ${total.toFixed(0)} saved`);
    posClearOrder(true);
  }

  function posClearOrder(skipConfirm) {
    if (!skipConfirm && posOrder.items.length > 0 && !confirm('Clear current order?')) return;
    posOrder = { items:[], discountType:'none', discountValue:0, paymentMethod: posOrder.paymentMethod, status:'paid' };
    const ds = document.getElementById('posDiscType');  if (ds) ds.value = 'none';
    const dv = document.getElementById('posDiscVal');   if (dv) { dv.value = '0'; dv.disabled = true; }
    posSetStatus('paid');
    updatePosUI();
  }

  // ── Print receipt ─────────────────────────────

    const { subtotal, discount, total } = posCalcTotals();
    const now      = new Date();

    const timeStr  = now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    const orderId  = `#${now.getTime().toString().slice(-6)}`;

    const itemRows = posOrder.items.map(i => `

          <td style="text-align:right;font-weight:700;font-size:13px;">QR&nbsp;${(i.price*i.qty).toFixed(0)}</td></tr>`).join('');

    const discRow = discount > 0 ? `

  // ── History & Summary ─────────────────────────
  function openPosHistory()  { renderPosHistory(); document.getElementById('posHistoryBg').classList.add('show'); }
  function closePosHistory() { document.getElementById('posHistoryBg').classList.remove('show'); }

  function renderPosHistory() {
    const today    = new Date();
    const todayPfx = today.toISOString().slice(0,10);
    const todayOrd = posOrders.filter(o => o.timestamp.startsWith(todayPfx));
    const paidOrd  = todayOrd.filter(o => o.status === 'paid');
    const revenue  = paidOrd.reduce((s,o) => s + o.total, 0);
    const avgOrd   = paidOrd.length > 0 ? revenue / paidOrd.length : 0;
    const dayLabel = today.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });

    const summaryHtml = `
      <div class="pos-summary-card">
        <div class="pos-sum-title">Today's Summary — ${dayLabel}</div>
        <div class="pos-sum-stats">
          <div class="pos-sum-stat"><span class="pos-sum-num"><sub>QR</sub>${revenue.toFixed(0)}</span><span class="pos-sum-lbl">Revenue</span></div>
          <div class="pos-sum-stat"><span class="pos-sum-num">${todayOrd.length}</span><span class="pos-sum-lbl">Orders</span></div>
          <div class="pos-sum-stat"><span class="pos-sum-num"><sub>QR</sub>${avgOrd.toFixed(0)}</span><span class="pos-sum-lbl">Avg. Order</span></div>
        </div>
      </div>`;

    const ordersHtml = posOrders.length === 0
      ? '<div class="pos-no-orders">No orders recorded yet</div>'
      : posOrders.map(o => {
          const d = new Date(o.timestamp);
          const t = d.toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
          const items = o.items.map(i => `${i.name} ×${i.qty}`).join(', ');
          const sc = o.status === 'paid' ? 'pos-tag-paid' : 'pos-tag-unpaid';
          const sl = o.status === 'paid' ? '✓ Paid' : '○ Unpaid';
          const dc = o.discount > 0 ? `<span class="pos-tag pos-tag-disc">−QR ${o.discount.toFixed(0)}</span>` : '';
          return `
            <div class="pos-ord-row">
              <div class="pos-ord-hd"><span class="pos-ord-id">${o.id}</span><span class="pos-ord-time">${t}</span></div>
              <div class="pos-ord-items">${items}</div>
              <div class="pos-ord-meta">
                <span class="pos-ord-total">QR ${o.total.toFixed(0)}</span>
                ${dc}
                <span class="pos-tag pos-tag-method">${o.paymentMethod === 'cash' ? '💵 Cash' : '💳 Card'}</span>
                <span class="pos-tag ${sc}">${sl}</span>
              </div>

        }).join('');

    document.getElementById('posHistoryBody').innerHTML = summaryHtml + ordersHtml;

  // ── Filter helpers ────────────────────────────
  function getCardPrice(card) {
    const el = card.querySelector('.prod-price');
    if (!el) return 0;
    const cl = el.cloneNode(true);
    const cu = cl.querySelector('.currency'); if (cu) cu.remove();
    return parseFloat(cl.textContent.trim()) || 0;
  }

  function updatePriceFill() {
    const minEl = document.getElementById('fbPriceMin');
    const maxEl = document.getElementById('fbPriceMax');
    const fill  = document.getElementById('fbPriceFill');
    if (!minEl || !maxEl || !fill) return;
    const min = parseFloat(minEl.value), max = parseFloat(maxEl.value);
    const total = parseFloat(maxEl.max) || 600;
    fill.style.left  = (min / total * 100) + '%';
    fill.style.right = (100 - max / total * 100) + '%';
    const minLbl = document.getElementById('fbPriceMinLabel');
    const maxLbl = document.getElementById('fbPriceMaxLabel');
    if (minLbl) minLbl.textContent = `QR ${min}`;
    if (maxLbl) maxLbl.textContent = max >= total ? `QR ${max}+` : `QR ${max}`;
  }

  function onPriceSlide() {
    const minEl = document.getElementById('fbPriceMin');
    const maxEl = document.getElementById('fbPriceMax');
    const gap = 25;
    if (parseFloat(minEl.value) > parseFloat(maxEl.value) - gap) minEl.value = parseFloat(maxEl.value) - gap;
    if (parseFloat(maxEl.value) < parseFloat(minEl.value) + gap) maxEl.value = parseFloat(minEl.value) + gap;
    updatePriceFill();
    applyFilters();
  }

  function resetPriceFilter() {
    const maxEl = document.getElementById('fbPriceMax');
    document.getElementById('fbPriceMin').value = 0;
    if (maxEl) maxEl.value = maxEl.max;
    updatePriceFill();
  }

  function updateFilterChips(sort, priceMin, priceMax, sliderMax) {
    const chips = [];
    if (sort !== 'newest') {
      const lbl = sort === 'price-asc' ? 'Price: Low → High' : 'Price: High → Low';
      chips.push(`<span class="fb-chip">${lbl}<button class="fb-chip-x" onclick="document.getElementById('sortSelect').value='newest';applyFilters()">✕</button></span>`);
    }
    if (priceMin > 0 || priceMax < sliderMax) {
      const maxLbl = priceMax >= sliderMax ? `${priceMax}+` : priceMax;
      chips.push(`<span class="fb-chip">QR ${priceMin} – ${maxLbl}<button class="fb-chip-x" onclick="resetPriceFilter();applyFilters()">✕</button></span>`);
    }
    const el = document.getElementById('fbChips');
    if (el) el.innerHTML = chips.join('');
    const btn = document.getElementById('fbResetBtn');
    if (btn) btn.style.display = chips.length ? 'inline-block' : 'none';
  }

  function resetFilters() {
    document.getElementById('sortSelect').value = 'newest';
    resetPriceFilter();
    applyFilters();
  }

  // ── Product search + filter + sort ────────────
  function applyFilters() {
    const raw       = document.getElementById('prodSearch')?.value || '';
    const query     = raw.trim().toLowerCase();
    const activeCat = document.querySelector('.cat-tab.active')?.dataset.cat || 'all';
    const sort      = document.getElementById('sortSelect')?.value || 'newest';
    const priceMinEl = document.getElementById('fbPriceMin');
    const priceMaxEl = document.getElementById('fbPriceMax');
    const sliderMax  = parseFloat(priceMaxEl?.max || 600);
    const priceMin   = parseFloat(priceMinEl?.value || 0);
    const priceMax   = parseFloat(priceMaxEl?.value || sliderMax);

    const cards = [...document.querySelectorAll('.prod-card')];
    const matching = [], nonMatching = [];

    cards.forEach(card => {
      const name     = (card.querySelector('.prod-body h3')?.textContent || '').trim().toLowerCase();
      const slug     = (card.dataset.cat || '').toLowerCase();
      const catLabel = (card.querySelector('.prod-cat')?.textContent || '').trim().toLowerCase();
      const price    = getCardPrice(card);

      const matchCat   = activeCat === 'all' || slug === activeCat;
      const matchQuery = !query || name.includes(query) || slug.replace(/-/g,' ').includes(query) || catLabel.includes(query);
      const matchPrice = price === 0 || (price >= priceMin && price <= priceMax);

      (matchCat && matchQuery && matchPrice ? matching : nonMatching).push(card);
    });

    // Sort matching cards
    matching.sort((a, b) => {
      if (sort === 'price-asc')  return getCardPrice(a) - getCardPrice(b);
      if (sort === 'price-desc') return getCardPrice(b) - getCardPrice(a);
      return parseInt(a.dataset.originalIndex || 0) - parseInt(b.dataset.originalIndex || 0);
    });

    // Reorder DOM: matching → non-matching → empty state
    const grid  = document.getElementById('productsGrid');
    const empty = document.getElementById('searchEmptyState');
    [...matching, ...nonMatching].forEach(c => grid.insertBefore(c, empty));

    // Visibility + animation
    matching.forEach(c => {
      c.classList.add('show');
      c.style.animation = 'none'; c.offsetHeight;
      c.style.animation = 'cardIn 0.35s ease both';
    });
    nonMatching.forEach(c => c.classList.remove('show'));

    const visible = matching.length;
    if (empty) empty.style.display = visible === 0 ? 'block' : 'none';

    // Search UI
    const clearBtn = document.getElementById('searchClear');
    if (clearBtn) clearBtn.style.display = query ? 'flex' : 'none';
    const tabsEl = document.querySelector('.cat-tabs');
    if (tabsEl) tabsEl.style.opacity = query ? '0.45' : '';
    const hint = document.getElementById('searchHint');
    if (hint) hint.textContent = query
      ? (visible === 0 ? `No results for "${raw.trim()}"` : `${visible} product${visible !== 1 ? 's' : ''} found`)
      : '';

    // Result count + chips
    const countEl = document.getElementById('filterResultCount');
    if (countEl) countEl.textContent = visible > 0 ? `${visible} product${visible !== 1 ? 's' : ''} shown` : '';
    updateFilterChips(sort, priceMin, priceMax, sliderMax);
  }

  function clearSearch() {
    const inp = document.getElementById('prodSearch');
    if (inp) { inp.value = ''; inp.focus(); }
    applyFilters();
  }

  // ── Category tabs ─────────────────────────────
  document.querySelectorAll('.cat-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      applyFilters();
    });
  });

  // ── Init filtering ────────────────────────────
  (function initProductFiltering() {
    document.querySelectorAll('.prod-card').forEach((card, i) => {
      card.dataset.originalIndex = i;
    });
    const prices = [...document.querySelectorAll('.prod-card')]
      .map(getCardPrice).filter(p => p > 0);
    if (prices.length) {
      const roundedMax = Math.ceil(Math.max(...prices) / 50) * 50 + 50;
      const maxEl = document.getElementById('fbPriceMax');
      const minEl = document.getElementById('fbPriceMin');
      if (maxEl) { maxEl.max = roundedMax; maxEl.value = roundedMax; }
      if (minEl) { minEl.max = roundedMax; }
      updatePriceFill();
    }
  })();

  // ── Nav scroll ────────────────────────────────
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll',()=>navbar.classList.toggle('scrolled',window.scrollY>60));


  // ══════════════════════════════════
  //  IMAGE EDITOR — SIMPLE & WORKING
  // ══════════════════════════════════
  (function(){
    var S = {};
    function gs(uid){ if(!S[uid]) S[uid]={z:1,x:0,y:0}; return S[uid]; }

    // Apply background-size + background-position on a wrapper div
    // Much simpler than transform — no pixel sizing issues
    function apply(uid){
      var wrap = document.getElementById('apim-'+uid);
      var lbl  = document.getElementById('appct-'+uid);
      if(!wrap) return;
      var s = gs(uid);
      wrap.style.backgroundSize     = (s.z * 100) + '% auto';
      wrap.style.backgroundPosition = s.x + '% ' + s.y + '%';
      if(lbl) lbl.textContent = Math.round(s.z*100) + '%';
      // Sync main card
      var card = document.querySelector('.prod-card[data-apid="'+uid+'"]');
      if(!card) return;
      var mi = card.querySelector('.prod-img img');
      var mb = card.querySelector('.prod-img-bg');
      if(mi){
        mi.style.objectFit      = 'cover';
        mi.style.objectPosition = s.x + '% ' + s.y + '%';
        mi.style.transform      = s.z !== 1 ? 'scale('+s.z+')' : '';
        mi.style.transformOrigin= s.x+'% '+s.y+'%';
      }
      if(mb){
        mb.style.backgroundSize    = (s.z*100)+'% auto';
        mb.style.backgroundPosition= s.x+'% '+s.y+'%';
      }
    }

    window.edZoom = function(uid, d){
      var s = gs(uid);
      s.z = Math.round(Math.min(4, Math.max(0.1, s.z + d)) * 100) / 100;
      apply(uid);
    };

    window.edReset = function(uid){
      S[uid] = {z:1, x:50, y:0};
      apply(uid);
    };

    function attach(uid){
      var wrap = document.getElementById('apim-'+uid);
      if(!wrap || wrap.dataset.ed) return;
      wrap.dataset.ed = '1';

      // Start: show full image
      var s = gs(uid);
      s.z = 1; s.x = 50; s.y = 0;
      apply(uid);

      var down=false, ox,oy,sx,sy;

      wrap.addEventListener('mousedown', function(e){
        if(e.button!==0) return;
        e.preventDefault(); e.stopPropagation();
        down=true; ox=e.clientX; oy=e.clientY;
        var s=gs(uid); sx=s.x; sy=s.y;
        wrap.style.cursor='grabbing';
      });

      document.addEventListener('mousemove', function(e){
        if(!down) return;
        var s=gs(uid);
        var cw=wrap.offsetWidth||140, ch=wrap.offsetHeight||140;
        // Moving mouse left → x increases (reveals right of image)
        s.x = Math.max(0, Math.min(100, sx - (e.clientX-ox)/cw * 100 / s.z));
        s.y = Math.max(0, Math.min(100, sy - (e.clientY-oy)/ch * 100 / s.z));
        apply(uid);
      });

      document.addEventListener('mouseup', function(){
        if(down){ down=false; wrap.style.cursor='grab'; }
      });

      // Touch
      wrap.addEventListener('touchstart',function(e){
        var t=e.touches[0]; down=true; ox=t.clientX; oy=t.clientY;
        var s=gs(uid); sx=s.x; sy=s.y;
      },{passive:true});
      wrap.addEventListener('touchmove',function(e){
        if(!down) return;
        var t=e.touches[0]; var s=gs(uid);
        var cw=wrap.offsetWidth||140, ch=wrap.offsetHeight||140;
        s.x=Math.max(0,Math.min(100, sx-(t.clientX-ox)/cw*100/s.z));
        s.y=Math.max(0,Math.min(100, sy-(t.clientY-oy)/ch*100/s.z));
        apply(uid);
      },{passive:true});
      wrap.addEventListener('touchend',function(){ down=false; });

      // Scroll wheel = scroll image UP/DOWN
      wrap.addEventListener('wheel', function(e){
        e.preventDefault();
        var s=gs(uid);
        var step = (e.deltaY > 0 ? 3 : -3); // 3% per scroll tick
        s.y = Math.max(0, Math.min(100, s.y + step));
        apply(uid);
      },{passive:false});

      wrap.style.cursor = 'grab';
    }

    // Hook into selectCol — runs AFTER it's defined since we're in same script
    var _orig = selectCol;
    selectCol = function(slug, name){
      _orig(slug, name);
      setTimeout(function(){
        document.querySelectorAll('.ap-editor-wrap').forEach(function(w){
          attach(w.id.replace('apim-',''));
        });
      }, 200);
    };

  })();

  // ── Scroll reveal ─────────────────────────────
  // Reveal observer + immediate fallback
  document.querySelectorAll('.reveal').forEach(el => {
    new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
    },{threshold:0.05}).observe(el);
  });
  // Fallback: force-show all reveals after 800ms
  setTimeout(() => {
    document.querySelectorAll('.reveal:not(.visible)').forEach(el => el.classList.add('visible'));
  }, 800);

</script>
